name: 1 - State Drift Report

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        description: Target vWAN profile (selects tfvars file and subscription)
        required: true
        default: Lab
        options:
          - Prod
          - Lab

env:
  TFVARS_FILE: ${{ inputs.profile == 'Prod' && 'config/prod.tfvars' || 'config/lab.tfvars' }}
  TF_BACKEND_RG: ${{ inputs.profile == 'Prod' && vars.PROD_TF_STATE_RG || vars.LAB_TF_STATE_RG }}
  TF_BACKEND_SA: ${{ inputs.profile == 'Prod' && vars.PROD_TF_STATE_SA || vars.LAB_TF_STATE_SA }}
  TF_BACKEND_CONTAINER: tfstate
  TF_BACKEND_KEY: ${{ inputs.profile == 'Prod' && 'vwan-prod.tfstate' || 'vwan-lab.tfstate' }}
  ARM_SUBSCRIPTION_ID: ${{ inputs.profile == 'Prod' && vars.PROD_AZURE_SUBSCRIPTION_ID || vars.LAB_AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_CLIENT_ID: ${{ vars.VWAN_SPN_CLIENT_ID }}
  ARM_USE_OIDC: true

permissions:
  id-token: write
  contents: read

jobs:
  report:
    name: Drift Report (${{ inputs.profile }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'Prod' || 'Lab' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${TF_BACKEND_RG}" \
            -backend-config="storage_account_name=${TF_BACKEND_SA}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
            -backend-config="key=${TF_BACKEND_KEY}"

      - name: Generate Drift Report
        run: |
          set -euo pipefail

          tf_quiet() {
            grep -vE '(Reading\.\.\.|Read complete|modtm_module_source|azapi_client_config|azurerm_client_config\.telemetry)' || true
          }

          echo "Running plan..."
          set +e
          terraform plan -out=_report.tfplan \
            -var-file="${TFVARS_FILE}" -input=false -detailed-exitcode 2>&1 | tf_quiet | tail -10
          PLAN_RC=$?
          set -e

          if [[ ! -f _report.tfplan ]]; then
            echo "❌ Plan failed — cannot generate report"
            exit 1
          fi

          terraform show -json _report.tfplan > _report.json 2>/dev/null

          CREATE_N=$(jq '[.resource_changes[] | select(.change.actions == ["create"]) | select(.type | startswith("azurerm_") or . == "azapi_resource")] | length' _report.json)
          UPDATE_N=$(jq '[.resource_changes[] | select(.change.actions == ["update"] or .change.actions == ["delete","create"]) | select(.type | startswith("azurerm_") or . == "azapi_resource")] | length' _report.json)
          DELETE_N=$(jq '[.resource_changes[] | select(.change.actions == ["delete"]) | select(.type | startswith("azurerm_") or . == "azapi_resource")] | length' _report.json)
          NOOP_N=$(jq '[.resource_changes[] | select(.change.actions == ["no-op"] or .change.actions == ["read"]) | select(.type | startswith("azurerm_") or . == "azapi_resource")] | length' _report.json)
          IMPORT_N=$(jq '[.resource_changes[] | select(.change.importing != null)] | length' _report.json)

          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  Drift Report — ${{ inputs.profile }}"
          echo "╠══════════════════════════════════════════════════╣"
          echo "  In sync:   $NOOP_N"
          echo "  Import:    $IMPORT_N"
          echo "  Create:    $CREATE_N"
          echo "  Update:    $UPDATE_N"
          echo "  Delete:    $DELETE_N"
          echo "╚══════════════════════════════════════════════════╝"

          if [[ $DELETE_N -gt 0 ]]; then
            echo ""
            echo "⚠️  Resources to DELETE:"
            jq -r '[.resource_changes[] | select(.change.actions == ["delete"]) | select(.type | startswith("azurerm_") or . == "azapi_resource") | .address] | .[] | "  • \(.)"' _report.json
          fi

          if [[ $CREATE_N -gt 0 ]]; then
            echo ""
            echo "Resources to CREATE:"
            jq -r '[.resource_changes[] | select(.change.actions == ["create"]) | select(.type | startswith("azurerm_") or . == "azapi_resource") | .address] | .[] | "  • \(.)"' _report.json
          fi

          rm -f _report.tfplan _report.json
