name: 1 - State Drift Report

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        description: Target vWAN profile (selects tfvars file and subscription)
        required: true
        default: Lab
        options:
          - Prod
          - Lab

env:
  TFVARS_FILE: ${{ inputs.profile == 'Prod' && 'config/prod.tfvars' || 'config/lab.tfvars' }}
  TF_BACKEND_RG: ${{ inputs.profile == 'Prod' && vars.PROD_TF_STATE_RG || vars.LAB_TF_STATE_RG }}
  TF_BACKEND_SA: ${{ inputs.profile == 'Prod' && vars.PROD_TF_STATE_SA || vars.LAB_TF_STATE_SA }}
  TF_BACKEND_CONTAINER: tfstate
  TF_BACKEND_KEY: ${{ inputs.profile == 'Prod' && 'vwan-prod.tfstate' || 'vwan-lab.tfstate' }}
  ARM_SUBSCRIPTION_ID: ${{ inputs.profile == 'Prod' && vars.PROD_AZURE_SUBSCRIPTION_ID || vars.LAB_AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_CLIENT_ID: ${{ vars.VWAN_SPN_CLIENT_ID }}
  ARM_USE_OIDC: true

permissions:
  id-token: write
  contents: read

jobs:
  report:
    name: Drift Report (${{ inputs.profile }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.profile }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.VWAN_SPN_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${TF_BACKEND_RG}" \
            -backend-config="storage_account_name=${TF_BACKEND_SA}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
            -backend-config="key=${TF_BACKEND_KEY}"

      - name: Generate Drift Report
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          # ─────────────────────────────────────────────────────
          # READ-ONLY: This workflow never modifies Azure or state.
          # It only reports what the deploy workflow would do.
          # ─────────────────────────────────────────────────────

          SUB_ID="${ARM_SUBSCRIPTION_ID}"

          tf_quiet() {
            grep -vE '(Reading\.\.\.|Read complete|modtm_module_source|azapi_client_config|azurerm_client_config\.telemetry)' || true
          }

          find_in_azure() {
            local tf_type="$1" name="$2" rg="$3" azapi_type="${4:-}" parent_id="${5:-}"

            if [[ "$tf_type" == "azurerm_resource_group" ]]; then
              az group show --name "$name" --subscription "$SUB_ID" &>/dev/null && return 0
              return 1
            fi
            if [[ "$tf_type" == "azapi_resource" && -n "$parent_id" && -n "$azapi_type" ]]; then
              local segs id
              segs=$(echo "$azapi_type" | tr '/' '\n' | wc -l)
              if (( segs > 2 )); then
                id="${parent_id}/$(echo "$azapi_type" | rev | cut -d/ -f1 | rev)/${name}"
              else
                id="${parent_id}/providers/${azapi_type}/${name}"
              fi
              az resource show --ids "$id" --subscription "$SUB_ID" &>/dev/null && return 0
              return 1
            fi
            local found=""
            if [[ -n "$rg" ]]; then
              found=$(az resource list --name "$name" -g "$rg" --subscription "$SUB_ID" \
                      --query "[0].id" -o tsv 2>/dev/null || true)
            fi
            if [[ -z "$found" ]]; then
              found=$(az resource list --name "$name" --subscription "$SUB_ID" \
                      --query "[0].id" -o tsv 2>/dev/null || true)
            fi
            [[ -n "$found" ]] && return 0
            return 1
          }

          echo "Running plan..."
          terraform plan -out=_report.tfplan \
            -var-file="${TFVARS_FILE}" 2>&1 | tf_quiet | tail -5 || true

          if [[ ! -f _report.tfplan ]]; then
            echo "❌ Plan failed — cannot generate report"
            exit 1
          fi
          terraform show -json _report.tfplan > _report.json 2>/dev/null

          # Categorize planned changes (only real Azure resources — skip telemetry, random_uuid, etc.)
          CREATES=$(jq -c '[.resource_changes[]
            | select(.change.actions == ["create"])
            | select(.type | startswith("azurerm_") or . == "azapi_resource")
            | select(.change.after.name != null and .change.after.name != "")
            | {address: .address, type: .type, name: .change.after.name, rg: (.change.after.resource_group_name // null), azapi_type: (if .type == "azapi_resource" then (.change.after.type // "" | split("@")[0]) else null end), parent_id: (if .type == "azapi_resource" then .change.after.parent_id else null end)}]' _report.json)
          UPDATES=$(jq '[.resource_changes[]
            | select(.change.actions == ["update"] or .change.actions == ["delete","create"])
            | select(.type | startswith("azurerm_") or . == "azapi_resource")
            | .address]' _report.json)
          DELETES=$(jq '[.resource_changes[]
            | select(.change.actions == ["delete"])
            | select(.type | startswith("azurerm_") or . == "azapi_resource")
            | .address]' _report.json)
          NOOPS=$(jq '[.resource_changes[]
            | select(.change.actions == ["no-op"] or .change.actions == ["read"])
            | select(.type | startswith("azurerm_") or . == "azapi_resource")
            | .address] | length' _report.json)

          COUNT=$(echo "$CREATES" | jq 'length')
          IMPORT_CANDIDATES=0
          NEW_RESOURCES=0

          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║       State Drift Report — ${{ inputs.profile }}              ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo ""

          if [[ "$COUNT" -gt 0 ]]; then
            echo "📋 Azure resources Terraform wants to CREATE ($COUNT):"
            echo ""

            for i in $(seq 0 $((COUNT - 1))); do
              ROW=$(echo "$CREATES" | jq -c ".[$i]")
              ADDR=$(echo "$ROW" | jq -r '.address')
              TYPE=$(echo "$ROW" | jq -r '.type')
              NAME=$(echo "$ROW" | jq -r '.name // empty')
              RG=$(echo "$ROW"   | jq -r '.rg // empty')
              AT=$(echo "$ROW"   | jq -r '.azapi_type // empty')
              PID=$(echo "$ROW"  | jq -r '.parent_id // empty')

              if [[ -n "$NAME" ]] && find_in_azure "$TYPE" "$NAME" "$RG" "$AT" "$PID" 2>/dev/null; then
                echo "  🔄 $ADDR ($NAME) — EXISTS in Azure, will be auto-imported"
                IMPORT_CANDIDATES=$((IMPORT_CANDIDATES + 1))
              else
                echo "  🆕 $ADDR ($NAME) — new, will be created"
                NEW_RESOURCES=$((NEW_RESOURCES + 1))
              fi
            done
            echo ""
          fi

          UPDATE_COUNT=$(echo "$UPDATES" | jq 'length')
          if [[ "$UPDATE_COUNT" -gt 0 ]]; then
            echo "✏️  Resources to UPDATE ($UPDATE_COUNT):"
            echo "$UPDATES" | jq -r '.[] | "  • \(.)"'
            echo ""
          fi

          DELETE_COUNT=$(echo "$DELETES" | jq 'length')
          if [[ "$DELETE_COUNT" -gt 0 ]]; then
            echo "⚠️  Resources to DELETE ($DELETE_COUNT):"
            echo "$DELETES" | jq -r '.[] | "  • \(.)"'
            echo ""
          fi

          echo "╠══════════════════════════════════════════════════╣"
          echo "║  Summary                                         ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "  In sync:            $NOOPS"
          echo "  Auto-import:        $IMPORT_CANDIDATES"
          echo "  New (will create):  $NEW_RESOURCES"
          echo "  Update:             $UPDATE_COUNT"
          echo "  Delete:             $DELETE_COUNT"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""

          if [[ $IMPORT_CANDIDATES -gt 0 ]]; then
            echo "ℹ️  The deploy workflow will auto-import existing resources."
            echo "   Run '2 - Deploy vWAN Network' with Plan mode first to review."
          fi

          if [[ $DELETE_COUNT -gt 0 ]]; then
            echo "⚠️  $DELETE_COUNT resource(s) will be DELETED — review carefully!"
          fi

          rm -f _report.tfplan _report.json
