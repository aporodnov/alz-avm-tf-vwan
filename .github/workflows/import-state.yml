name: 1 - Import State

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        description: Target vWAN profile (selects tfvars file and subscription)
        required: true
        default: Lab
        options:
          - Prod
          - Lab

env:
  TFVARS_FILE: ${{ inputs.profile == 'Prod' && 'config/prod.tfvars' || 'config/lab.tfvars' }}
  TF_BACKEND_RG: ${{ inputs.profile == 'Prod' && vars.PROD_TF_STATE_RG || vars.LAB_TF_STATE_RG }}
  TF_BACKEND_SA: ${{ inputs.profile == 'Prod' && vars.PROD_TF_STATE_SA || vars.LAB_TF_STATE_SA }}
  TF_BACKEND_CONTAINER: tfstate
  TF_BACKEND_KEY: ${{ inputs.profile == 'Prod' && 'vwan-prod.tfstate' || 'vwan-lab.tfstate' }}
  ARM_SUBSCRIPTION_ID: ${{ inputs.profile == 'Prod' && vars.PROD_AZURE_SUBSCRIPTION_ID || vars.LAB_AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_CLIENT_ID: ${{ vars.VWAN_SPN_CLIENT_ID }}
  ARM_USE_OIDC: true

permissions:
  id-token: write
  contents: read

jobs:
  import:
    name: Detect & Import
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'Prod' || 'Lab' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false   # required — wrapper breaks JSON parsing

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.VWAN_SPN_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${TF_BACKEND_RG}" \
            -backend-config="storage_account_name=${TF_BACKEND_SA}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
            -backend-config="key=${TF_BACKEND_KEY}"

      - name: Detect & Import Existing Resources
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          SUB_ID="${ARM_SUBSCRIPTION_ID}"
          TOTAL=0
          MAX_PASSES=5

          # ── Helpers ─────────────────────────────────────────────

          # Import a single resource into Terraform state.
          # Fast path:  terraform import  (validates full config graph)
          # Slow path:  import block + targeted apply  (evaluates only
          #             the target resource & its deps — avoids for_each
          #             errors in unrelated modules)
          import_resource() {
            local addr="$1" id="$2"
            echo "→  ${addr}"
            echo "   ID: ${id}"

            if terraform import -var-file="${TFVARS_FILE}" "${addr}" "${id}" 2>/dev/null; then
              echo "   ✅ Imported"
              return 0
            fi

            echo "   ⚠️  Direct import blocked — retrying with targeted apply..."
            cat > _auto_import.tf <<IMPEOF
          import {
            to = ${addr}
            id = "${id}"
          }
          IMPEOF

            local rc=0
            terraform apply -target="${addr}" -var-file="${TFVARS_FILE}" -auto-approve 2>&1 || rc=$?
            rm -f _auto_import.tf

            if [[ $rc -eq 0 ]]; then
              echo "   ✅ Imported via targeted apply"
              return 0
            fi
            echo "   ❌ Failed — may need manual intervention"
            return 1
          }

          # Look up a resource in Azure; prints its resource ID on success.
          find_in_azure() {
            local tf_type="$1" name="$2" rg="$3" azapi_type="${4:-}" parent_id="${5:-}"

            # Resource groups
            if [[ "$tf_type" == "azurerm_resource_group" ]]; then
              local id="/subscriptions/${SUB_ID}/resourceGroups/${name}"
              az group show --name "$name" --subscription "$SUB_ID" &>/dev/null && echo "$id" && return 0
              return 1
            fi

            # azapi_resource — build ID from parent + type + name
            if [[ "$tf_type" == "azapi_resource" && -n "$parent_id" && -n "$azapi_type" ]]; then
              local segs id
              segs=$(echo "$azapi_type" | tr '/' '\n' | wc -l)
              if (( segs > 2 )); then
                id="${parent_id}/$(echo "$azapi_type" | rev | cut -d/ -f1 | rev)/${name}"
              else
                id="${parent_id}/providers/${azapi_type}/${name}"
              fi
              az resource show --ids "$id" --subscription "$SUB_ID" &>/dev/null && echo "$id" && return 0
              return 1
            fi

            # azurerm_* — search Azure by name (scoped to RG when known)
            local found=""
            if [[ -n "$rg" ]]; then
              found=$(az resource list --name "$name" -g "$rg" --subscription "$SUB_ID" \
                      --query "[0].id" -o tsv 2>/dev/null || true)
            fi
            if [[ -z "$found" ]]; then
              found=$(az resource list --name "$name" --subscription "$SUB_ID" \
                      --query "[0].id" -o tsv 2>/dev/null || true)
            fi
            [[ -n "$found" ]] && echo "$found" && return 0
            return 1
          }

          # Remove azapi state entries whose Azure resource was deleted
          clean_stale_azapi() {
            local entries removed=0
            entries=$(terraform state list 2>/dev/null | grep 'azapi_resource\.' || true)
            [[ -z "$entries" ]] && return
            while IFS= read -r addr; do
              local rid
              rid=$(terraform state show "$addr" 2>/dev/null \
                    | grep '^\s*id\s*=' | head -1 \
                    | sed 's/.*"\(.*\)"/\1/' || true)
              [[ -z "$rid" ]] && continue
              if ! az resource show --ids "$rid" --subscription "$SUB_ID" &>/dev/null; then
                echo "  🗑 Removing stale: $addr"
                terraform state rm "$addr" 2>/dev/null || true
                removed=$((removed + 1))
              fi
            done <<< "$entries"
            echo "  Cleaned $removed stale entry/entries."
          }

          # ── Phase 0: Clean stale state entries ──────────────────
          echo "Phase 0 — Cleaning stale state entries..."
          clean_stale_azapi

          # ── Phase 1: Bootstrap resource groups ──────────────────
          # RG names are extracted from the tfvars file and imported
          # first so the main plan has a better chance of succeeding.
          echo ""
          echo "Phase 1 — Bootstrapping resource groups..."
          declare -A RG_MAP=(
            [networking_resource_group_name]="azurerm_resource_group.networking"
            [dns_resource_group_name]="azurerm_resource_group.dns[0]"
          )
          for var_name in "${!RG_MAP[@]}"; do
            rg_name=$(awk -F'"' "/${var_name}/"'{print $2}' "${TFVARS_FILE}" 2>/dev/null || true)
            [[ -z "$rg_name" ]] && continue
            addr="${RG_MAP[$var_name]}"

            if terraform state show "$addr" &>/dev/null 2>&1; then
              echo "  ✓ $addr already in state"
              continue
            fi

            rg_id="/subscriptions/${SUB_ID}/resourceGroups/${rg_name}"
            if az group show --name "$rg_name" --subscription "$SUB_ID" &>/dev/null; then
              import_resource "$addr" "$rg_id" && TOTAL=$((TOTAL + 1))
            else
              echo "  ✓ $rg_name not in Azure — will be created"
            fi
          done

          # ── Phase 2: Multi-pass plan-based discovery & import ───
          for PASS in $(seq 1 $MAX_PASSES); do
            echo ""
            echo "═══════════════════════════════════════════"
            echo " Pass ${PASS} / ${MAX_PASSES}"
            echo "═══════════════════════════════════════════"

            rm -f tfplan plan.json _auto_import.tf

            # Plan may fail (e.g. for_each errors) — that's OK if it
            # still wrote a plan file (partial plans are still useful).
            terraform plan -out=tfplan -refresh=false \
              -var-file="${TFVARS_FILE}" 2>&1 | tail -30 || true

            if [[ ! -f tfplan ]]; then
              echo "⚠️  Plan did not produce output — retrying next pass"
              continue
            fi
            if ! terraform show -json tfplan > plan.json 2>/dev/null; then
              echo "⚠️  Cannot parse plan — retrying next pass"
              continue
            fi

            # Extract resources Terraform wants to create
            CREATES=$(jq -c '[
              .resource_changes[]
              | select(.change.actions == ["create"])
              | select(.type | startswith("azurerm_") or . == "azapi_resource")
              | {
                  address:    .address,
                  type:       .type,
                  name:       (.change.after.name // null),
                  rg:         (.change.after.resource_group_name // null),
                  azapi_type: (if .type == "azapi_resource"
                               then (.change.after.type // "" | split("@")[0])
                               else null end),
                  parent_id:  (if .type == "azapi_resource"
                               then .change.after.parent_id
                               else null end)
                }
            ]' plan.json)

            COUNT=$(echo "$CREATES" | jq 'length')
            if [[ "$COUNT" -eq 0 ]]; then
              echo "✅ State is fully reconciled — nothing to create."
              break
            fi
            echo "Found $COUNT resource(s) planned for creation."

            PASS_IMPORTED=0
            for i in $(seq 0 $((COUNT - 1))); do
              ROW=$(echo "$CREATES" | jq -c ".[$i]")
              ADDR=$(echo "$ROW"  | jq -r '.address')
              TYPE=$(echo "$ROW"  | jq -r '.type')
              NAME=$(echo "$ROW"  | jq -r '.name // empty')
              RG=$(echo "$ROW"    | jq -r '.rg // empty')
              AT=$(echo "$ROW"    | jq -r '.azapi_type // empty')
              PID=$(echo "$ROW"   | jq -r '.parent_id // empty')

              [[ -z "$NAME" ]] && echo "⏭  $ADDR — name unknown, deferring" && continue

              AZURE_ID=$(find_in_azure "$TYPE" "$NAME" "$RG" "$AT" "$PID" 2>/dev/null) || true
              if [[ -n "$AZURE_ID" ]]; then
                import_resource "$ADDR" "$AZURE_ID" && PASS_IMPORTED=$((PASS_IMPORTED + 1))
              else
                echo "✓  $ADDR ($NAME) — not in Azure, will be created"
              fi
            done

            TOTAL=$((TOTAL + PASS_IMPORTED))
            echo ""
            echo "Pass $PASS: imported $PASS_IMPORTED | Total: $TOTAL"

            if [[ $PASS_IMPORTED -eq 0 ]]; then
              echo "No new imports — remaining resources are genuinely new."
              break
            fi
            echo "Re-planning to resolve dependencies..."
          done

          # ── Cleanup ─────────────────────────────────────────────
          echo ""
          echo "Post-import — cleaning stale entries..."
          clean_stale_azapi
          rm -f tfplan plan.json _auto_import.tf

          echo ""
          echo "════════════════════════════════════════════"
          echo " Import complete — $TOTAL resource(s) adopted"
          echo "════════════════════════════════════════════"

      - name: Final Plan (verify)
        run: terraform plan -var-file="${TFVARS_FILE}"
