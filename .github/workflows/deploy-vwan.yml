name: 2 - Deploy vWAN Network

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        description: Target vWAN profile (selects tfvars file and subscription)
        required: true
        default: Lab
        options:
          - Prod
          - Lab
      mode:
        type: choice
        description: Plan only, or Plan then Apply the saved plan
        required: true
        default: Plan
        options:
          - Plan
          - Plan & Apply

env:
  TFVARS_FILE: ${{ inputs.profile == 'Prod' && 'config/prod.tfvars' || 'config/lab.tfvars' }}
  TF_BACKEND_RG: ${{ inputs.profile == 'Prod' && vars.PROD_TF_STATE_RG || vars.LAB_TF_STATE_RG }}
  TF_BACKEND_SA: ${{ inputs.profile == 'Prod' && vars.PROD_TF_STATE_SA || vars.LAB_TF_STATE_SA }}
  TF_BACKEND_CONTAINER: tfstate
  TF_BACKEND_KEY: ${{ inputs.profile == 'Prod' && 'vwan-prod.tfstate' || 'vwan-lab.tfstate' }}
  ARM_SUBSCRIPTION_ID: ${{ inputs.profile == 'Prod' && vars.PROD_AZURE_SUBSCRIPTION_ID || vars.LAB_AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_CLIENT_ID: ${{ vars.VWAN_SPN_CLIENT_ID }}
  ARM_USE_OIDC: true

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'Prod' || 'Lab' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${TF_BACKEND_RG}" \
            -backend-config="storage_account_name=${TF_BACKEND_SA}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
            -backend-config="key=${TF_BACKEND_KEY}"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.VWAN_SPN_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Discover & Plan
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          SUB_ID="${ARM_SUBSCRIPTION_ID}"
          IMPORTS_FILE="imports_generated.tf"
          MAX_PASSES=4
          rm -f "$IMPORTS_FILE" tfplan plan.json

          # Filter noisy telemetry/data-source reads
          tf_quiet() {
            grep -vE '(Reading\.\.\.|Read complete|modtm_module_source|azapi_client_config|azurerm_client_config\.telemetry)' || true
          }

          # Look up a resource in Azure; prints its resource ID on success.
          find_in_azure() {
            local tf_type="$1" name="$2" rg="$3" azapi_type="${4:-}" parent_id="${5:-}"

            if [[ "$tf_type" == "azurerm_resource_group" ]]; then
              local id="/subscriptions/${SUB_ID}/resourceGroups/${name}"
              az group show --name "$name" --subscription "$SUB_ID" &>/dev/null && echo "$id" && return 0
              return 1
            fi

            # azapi_resource with known parent — build ID directly (fast path)
            if [[ "$tf_type" == "azapi_resource" && -n "$parent_id" && -n "$azapi_type" ]]; then
              local segs id
              segs=$(echo "$azapi_type" | tr '/' '\n' | wc -l)
              if (( segs > 2 )); then
                id="${parent_id}/$(echo "$azapi_type" | rev | cut -d/ -f1 | rev)/${name}"
              else
                id="${parent_id}/providers/${azapi_type}/${name}"
              fi
              az resource show --ids "$id" --subscription "$SUB_ID" &>/dev/null && echo "$id" && return 0
              return 1
            fi

            # azurerm_* — search by name, scoped to RG when known
            local found=""
            if [[ -n "$rg" ]]; then
              found=$(az resource list --name "$name" -g "$rg" --subscription "$SUB_ID" \
                      --query "[0].id" -o tsv 2>/dev/null || true)
            fi
            # Only fall back to subscription-wide search for resource groups
            # (avoids false-positive name collisions across RGs)
            if [[ -z "$found" && -z "$rg" ]]; then
              found=$(az resource list --name "$name" --subscription "$SUB_ID" \
                      --query "[0].id" -o tsv 2>/dev/null || true)
            fi
            [[ -n "$found" ]] && echo "$found" && return 0
            return 1
          }

          # Multi-pass: each pass discovers resources, writes import blocks,
          # then re-plans so child resources (e.g. subnets under a VNet)
          # get their parent_id resolved in the next pass.
          TOTAL_IMPORTS=0

          for PASS in $(seq 1 $MAX_PASSES); do
            echo ""
            echo "═══════════════════════════════════════"
            echo " Discovery pass ${PASS} / ${MAX_PASSES}"
            echo "═══════════════════════════════════════"

            rm -f tfplan plan.json

            # Capture plan output for error reporting; don't fail the loop
            PLAN_OUTPUT=$(terraform plan -out=tfplan -var-file="${TFVARS_FILE}" 2>&1) || true
            echo "$PLAN_OUTPUT" | tf_quiet | tail -15

            if [[ ! -f tfplan ]]; then
              if [[ $PASS -lt $MAX_PASSES && $TOTAL_IMPORTS -gt 0 ]]; then
                echo "⚠️  Plan failed — retrying next pass after previous imports settle..."
                continue
              fi
              echo "❌ Plan failed to produce output"
              echo "$PLAN_OUTPUT" | tf_quiet | grep -iE 'Error:|error:' | head -10 || true
              exit 1
            fi
            terraform show -json tfplan > plan.json 2>/dev/null

            CREATES=$(jq -c '[
              .resource_changes[]
              | select(.change.actions == ["create"])
              | select(.type | startswith("azurerm_") or . == "azapi_resource")
              | {
                  address:    .address,
                  type:       .type,
                  name:       (.change.after.name // null),
                  rg:         (.change.after.resource_group_name // null),
                  azapi_type: (if .type == "azapi_resource"
                               then (.change.after.type // "" | split("@")[0])
                               else null end),
                  parent_id:  (if .type == "azapi_resource"
                               then .change.after.parent_id
                               else null end)
                }
            ]' plan.json)

            COUNT=$(echo "$CREATES" | jq 'length')
            if [[ "$COUNT" -eq 0 ]]; then
              echo "✅ No resources to create — state is in sync"
              break
            fi

            # Batch Azure lookups: collect all azapi_resource IDs to check in
            # one az resource list call per resource group for speed.
            PASS_IMPORTS=0
            for i in $(seq 0 $((COUNT - 1))); do
              ROW=$(echo "$CREATES" | jq -c ".[$i]")
              ADDR=$(echo "$ROW"  | jq -r '.address')
              TYPE=$(echo "$ROW"  | jq -r '.type')
              NAME=$(echo "$ROW"  | jq -r '.name // empty')
              RG=$(echo "$ROW"    | jq -r '.rg // empty')
              AT=$(echo "$ROW"    | jq -r '.azapi_type // empty')
              PID=$(echo "$ROW"   | jq -r '.parent_id // empty')

              [[ -z "$NAME" ]] && continue

              # Skip if already in imports file
              if [[ -f "$IMPORTS_FILE" ]] && grep -qF "to = ${ADDR}" "$IMPORTS_FILE"; then
                continue
              fi

              AZURE_ID=$(find_in_azure "$TYPE" "$NAME" "$RG" "$AT" "$PID" 2>/dev/null) || true
              if [[ -n "$AZURE_ID" ]]; then
                echo "  🔄 $ADDR → $AZURE_ID"
                cat >> "$IMPORTS_FILE" <<EOF
          import {
            to = ${ADDR}
            id = "${AZURE_ID}"
          }

          EOF
                PASS_IMPORTS=$((PASS_IMPORTS + 1))
              fi
            done

            TOTAL_IMPORTS=$((TOTAL_IMPORTS + PASS_IMPORTS))

            if [[ $PASS_IMPORTS -eq 0 ]]; then
              echo "No new imports — plan is final"
              break
            fi

            echo "  Found $PASS_IMPORTS new import(s) (total: $TOTAL_IMPORTS) — re-planning..."
          done

          rm -f plan.json

          # Show final plan summary
          echo ""
          echo "═══════════════════════════════════════"
          echo " Final Plan ($TOTAL_IMPORTS import(s))"
          echo "═══════════════════════════════════════"
          terraform show tfplan 2>&1 | tf_quiet

      - name: Upload Plan Artifact
        if: inputs.mode == 'Plan & Apply'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.profile }}
          path: tfplan
          retention-days: 1

  apply:
    name: Terraform Apply
    needs: plan
    if: inputs.mode == 'Plan & Apply'
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'Prod' || 'Lab' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${TF_BACKEND_RG}" \
            -backend-config="storage_account_name=${TF_BACKEND_SA}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
            -backend-config="key=${TF_BACKEND_KEY}"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.profile }}

      - name: Terraform Apply
        run: |
          set -o pipefail
          terraform apply tfplan 2>&1 \
            | grep -vE '(Reading\.\.\.|Read complete|modtm_module_source|azapi_client_config|azurerm_client_config\.telemetry)'
